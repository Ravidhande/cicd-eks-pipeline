apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-eks-app
  labels:
    app: cicd-eks-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cicd-eks-app
  template:
    metadata:
      labels:
        app: cicd-eks-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      containers:
      - name: cicd-eks-app
        image: 354918370166.dkr.ecr.ap-south-1.amazonaws.com/cicd-eks-app:latest
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5